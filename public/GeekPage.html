<!DOCTYPE html>
<html>

<head>
    <title>Geek | MIST</title>
    <link rel="stylesheet" type="text/css" href="./stylings/GeekStyling.css" media="screen" />
    <script src="./scripts/Geek.js"></script>
</head>

<body>
    <div id="container">
        <div id="window">
            <div id="titleBar">
                <div id="titleName">
                    <p>sudo.mist@localhost</p>
                </div>
                <div id="buttons">
                    <div class="navButtns" id="closeButton" onclick="exitTerminal()">
                        <p>X</p>
                    </div>
                </div>
            </div>
            <div class="terminalArea">
                <div id=""></div>
                <p>sudo.mist@manipal:<span class="accessIndicator">~ $</span></p>
                <input type="text" name="command" class="app-control" autocomplete="off" autocapitalize="off"
                    autocorrect="off">
            </div>
        </div>
    </div>
</body>

</html>
