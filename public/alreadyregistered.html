<!DOCTYPE html>
<html>

<head>
    <title>Subscription | MIST</title>
    <link rel="icon" href="http://drive.google.com/uc?export=view&id=1T96CLtCEN_KQPS_KbMU3bwrx6OUp71tW"
        type="image/icon type">
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0' />
</head>

<body>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Cedarville+Cursive&display=swap');

        * {
            padding: 0;
            border: 0;
            margin: 0;
        }

        body {
            overflow: hidden;
            user-select: none;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-image: url("./images/backgrounds/alreadySubscribed.jpg");
        }

        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.24);
        }

        #banner {
            min-width: fit-content;
            width: 45vw;
            position: absolute;
            right: 0;
            margin-right: 10%;
            margin-top: auto;
            margin-bottom: auto;
            text-align: center;
            color: #fff;
        }

        h1 {
            font-size: 20vh;
            font-family: 'Cedarville Cursive', cursive;
        }

        p {
            font-size: 20px;
        }

        .button {
            display: block;
            width: 10vw;
            min-width: 200px;
            max-width: 100%;
            margin: 15px auto;
            margin-bottom: 0;
            overflow: hidden;
            position: relative;
            transform: translatez(0);
            text-decoration: none;
            box-sizing: border-box;
            font-size: 20px;
            font-weight: normal;
            box-shadow: 0 9px 18px rgba(0, 0, 0, 0.2);
        }

        .glowButton {
            text-align: center;
            border-radius: 50px;
            padding: 26px;
            color: white;
            background: #BD3381;
            transition: all 0.2s ease-out 0s;
        }

        .gradient {
            display: block;
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            bottom: auto;
            margin: auto;
            z-index: -1;
            background: radial-gradient(90px circle at top center, rgba(238, 88, 63, .8) 30%, rgba(255, 255, 255, 0));
            transition: all 0s ease-out 0s;
            transform: translatex(-140px);
            animation: 18s linear 0s infinite move;
        }

        @keyframes move {
            0% {
                transform: translatex(-140px);
            }

            25% {
                transform: translatex(140px);
                opacity: 0.3;
            }

            50% {
                transform: translatex(140px);
                opacity: 1;
                background: radial-gradient(90px circle at bottom center, rgba(238, 88, 63, .5) 30%, rgba(255, 255, 255, 0));
            }

            75% {
                transform: translatex(-140px);
                opacity: 0.3;
            }

            100% {
                opacity: 1;
                transform: translatex(-140px);
                background: radial-gradient(90px circle at top center, rgba(63, 197, 238, 0.5) 30%, rgba(255, 255, 255, 0));
            }
        }
    </style>
    <div id="container">
        <div id="banner">
            <h1>Oops!</h1>
            <p>You are there in our mailing list, we are already friends.</p>
            <a href="/news" class="button glowButton"><span class="gradient"></span>Go back</a>
        </div>
    </div>
</body>

</html>
