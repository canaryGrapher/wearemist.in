        transition: 0.3s;
        border-radius: 5px;
      }

      img {
        border-radius: 5px 5px 0 0;
      }

      .memberImage {
        width: 100%;

      .infoName {

        height: fit-content;

      .nameTag {

      }

      }

        height: 15vh;
